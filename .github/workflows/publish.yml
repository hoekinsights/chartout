name: Publish to PyPI

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python

    permissions:
      contents: write
      id-token: write  # required for PyPI trusted publishing

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install build dependencies
        run: pip install hatchling build

      - name: Read version
        id: version
        run: |
          VERSION=$(python -c "import re; print(re.search(r'__version__ = \"(.+?)\"', open('chartout/__init__.py').read()).group(1))")
          echo "value=$VERSION" >> $GITHUB_OUTPUT

      - name: Create and push tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.version.outputs.value }}" || echo "Tag already exists, skipping"
          git push origin "v${{ steps.version.outputs.value }}" || echo "Tag already pushed, skipping"

      - name: Build
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist
